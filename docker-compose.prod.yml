services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api

  api:
    build: .
    restart: unless-stopped
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips="*"
    environment:
      DATABASE_URL: postgresql+psycopg://cashflow:${POSTGRES_PASSWORD}@postgres:5432/cashflow
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
      API_KEY: ${API_KEY}
      QUEUE_NAME: transaction.created
      CORS_ORIGINS: ${APP_ORIGIN}
      REALTIME_POLL_INTERVAL_SECONDS: ${REALTIME_POLL_INTERVAL_SECONDS:-2}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-25}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-35}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-12}
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: python -m src.consolidation.worker
    environment:
      DATABASE_URL: postgresql+psycopg://cashflow:${POSTGRES_PASSWORD}@postgres:5432/cashflow
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
      API_KEY: ${API_KEY}
      QUEUE_NAME: transaction.created
      DATABASE_POOL_SIZE: 10
      DATABASE_MAX_OVERFLOW: 10
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-12}
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  outbox-dispatcher:
    build: .
    restart: unless-stopped
    command: python -m src.messaging.outbox_dispatcher
    environment:
      DATABASE_URL: postgresql+psycopg://cashflow:${POSTGRES_PASSWORD}@postgres:5432/cashflow
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
      API_KEY: ${API_KEY}
      QUEUE_NAME: transaction.created
      DATABASE_POOL_SIZE: 10
      DATABASE_MAX_OVERFLOW: 10
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-12}
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://cashflow:${POSTGRES_PASSWORD}@postgres:5432/cashflow
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
      API_KEY: ${API_KEY}
      QUEUE_NAME: transaction.created
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: cashflow
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow -d cashflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  rabbitmq_data:
  caddy_data:
  caddy_config:
