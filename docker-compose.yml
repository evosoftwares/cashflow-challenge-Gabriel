services:
  api:
    build: .
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+psycopg://cashflow:cashflow@postgres:5432/cashflow
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: local-dev-key
      QUEUE_NAME: transaction.created
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  worker:
    build: .
    command: python -m src.consolidation.worker
    environment:
      DATABASE_URL: postgresql+psycopg://cashflow:cashflow@postgres:5432/cashflow
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: local-dev-key
      QUEUE_NAME: transaction.created
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  outbox-dispatcher:
    build: .
    command: python -m src.messaging.outbox_dispatcher
    environment:
      DATABASE_URL: postgresql+psycopg://cashflow:cashflow@postgres:5432/cashflow
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: local-dev-key
      QUEUE_NAME: transaction.created
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://cashflow:cashflow@postgres:5432/cashflow
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: local-dev-key
      QUEUE_NAME: transaction.created
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cashflow
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: cashflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow -d cashflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
